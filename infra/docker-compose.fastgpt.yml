name: pas-fastgpt-exp

services:
  mongo:
    image: mongo:5.0.32
    restart: unless-stopped
    command: mongod --keyFile /data/mongodb.key --replSet rs0
    entrypoint:
      - bash
      - -c
      - |
        openssl rand -base64 128 > /data/mongodb.key
        chmod 400 /data/mongodb.key
        chown 999:999 /data/mongodb.key
        cat > /data/initReplicaSet.js <<'EOF'
        const isInited = rs.status().ok === 1
        if (!isInited) {
          rs.initiate({
            _id: 'rs0',
            members: [{ _id: 0, host: 'mongo:27017' }]
          })
        }
        EOF
        exec docker-entrypoint.sh "$$@" &
        until mongo -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --eval "print('ready')"; do
          sleep 2
        done
        mongo -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin /data/initReplicaSet.js
        wait $$!
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:?MONGO_USER is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
    volumes:
      - mongo-data:/data/db
    networks:
      - fastgpt-internal
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'mongo -u "$$MONGO_INITDB_ROOT_USERNAME" -p "$$MONGO_INITDB_ROOT_PASSWORD" --authenticationDatabase admin --quiet --eval "quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command:
      [
        'redis-server',
        '--requirepass',
        '${REDIS_PASSWORD:?REDIS_PASSWORD is required}',
        '--appendonly',
        'yes',
        '--save',
        '60',
        '10',
        '--maxmemory',
        '1gb',
        '--maxmemory-policy',
        'noeviction',
      ]
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis-data:/data
    networks:
      - fastgpt-internal
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a "$$REDIS_PASSWORD" ping | grep PONG']
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 10s

  postgres:
    image: pgvector/pgvector:0.8.0-pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - fastgpt-internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
      interval: 5s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    restart: unless-stopped
    command: server /data
    ports:
      - '127.0.0.1:${MINIO_API_PORT:?MINIO_API_PORT is required}:9000'
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    volumes:
      - minio-data:/data
    networks:
      - fastgpt-internal
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  plugin:
    image: ghcr.io/labring/fastgpt-plugin:v0.6.0
    restart: unless-stopped
    environment:
      AUTH_TOKEN: ${PLUGIN_TOKEN:?PLUGIN_TOKEN is required}
      MONGODB_URI: mongodb://${MONGO_USER:?MONGO_USER is required}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongo:27017/fastgpt?authSource=admin
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      DB_MAX_LINK: '10'
      STORAGE_VENDOR: minio
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      STORAGE_PUBLIC_BUCKET: fastgpt-public
      STORAGE_PRIVATE_BUCKET: fastgpt-private
      STORAGE_EXTERNAL_ENDPOINT: http://host.docker.internal:${MINIO_API_PORT:?MINIO_API_PORT is required}
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_FORCE_PATH_STYLE: 'true'
      STORAGE_S3_MAX_RETRIES: '3'
      LOG_ENABLE_CONSOLE: 'true'
      LOG_CONSOLE_LEVEL: info
      LOG_ENABLE_OTEL: 'false'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    networks:
      - fastgpt-internal
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://127.0.0.1:3000/health']
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s

  app:
    image: ghcr.io/labring/fastgpt:${FASTGPT_VERSION:?FASTGPT_VERSION is required}
    restart: unless-stopped
    ports:
      - '127.0.0.1:${FASTGPT_PORT:?FASTGPT_PORT is required}:3000'
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      HOSTNAME: 0.0.0.0
      FE_DOMAIN: http://localhost:${FASTGPT_PORT:?FASTGPT_PORT is required}
      DEFAULT_ROOT_PSW: ${DEFAULT_ROOT_PSW:?DEFAULT_ROOT_PSW is required}
      ROOT_KEY: ${ROOT_KEY:?ROOT_KEY is required}
      TOKEN_KEY: ${TOKEN_KEY:?TOKEN_KEY is required}
      FILE_TOKEN_KEY: ${FILE_TOKEN_KEY:?FILE_TOKEN_KEY is required}
      AES256_SECRET_KEY: ${AES256_SECRET_KEY:?AES256_SECRET_KEY is required}
      MONGODB_URI: mongodb://${MONGO_USER:?MONGO_USER is required}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongo:27017/fastgpt?authSource=admin
      MONGODB_LOG_URI: mongodb://${MONGO_USER:?MONGO_USER is required}:${MONGO_PASSWORD:?MONGO_PASSWORD is required}@mongo:27017/fastgpt?authSource=admin
      REDIS_URL: redis://default:${REDIS_PASSWORD:?REDIS_PASSWORD is required}@redis:6379
      PG_URL: postgresql://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      STORAGE_VENDOR: minio
      STORAGE_REGION: us-east-1
      STORAGE_ACCESS_KEY_ID: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      STORAGE_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      STORAGE_PUBLIC_BUCKET: fastgpt-public
      STORAGE_PRIVATE_BUCKET: fastgpt-private
      STORAGE_EXTERNAL_ENDPOINT: http://host.docker.internal:${MINIO_API_PORT:?MINIO_API_PORT is required}
      STORAGE_S3_ENDPOINT: http://minio:9000
      STORAGE_S3_FORCE_PATH_STYLE: 'true'
      STORAGE_S3_MAX_RETRIES: '3'
      OPENAI_BASE_URL: ${LLM_BASE_URL:?LLM_BASE_URL is required}
      CHAT_API_KEY: ${LLM_API_KEY:?LLM_API_KEY is required}
      HELPER_BOT_MODEL: ${LLM_MODEL:?LLM_MODEL is required}
      PLUGIN_BASE_URL: http://plugin:3000
      PLUGIN_TOKEN: ${PLUGIN_TOKEN:?PLUGIN_TOKEN is required}
      DB_MAX_LINK: '20'
      SYNC_INDEX: '0'
      MULTIPLE_DATA_TO_BASE64: 'true'
      CHECK_INTERNAL_IP: 'false'
      USE_IP_LIMIT: 'false'
      LOG_ENABLE_CONSOLE: 'true'
      LOG_CONSOLE_LEVEL: info
      LOG_ENABLE_OTEL: 'false'
    volumes:
      - ./fastgpt-config.json:/app/data/config.json:ro
    networks:
      - fastgpt-internal
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      plugin:
        condition: service_healthy
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 90s

networks:
  fastgpt-internal:
    internal: false

volumes:
  mongo-data:
  redis-data:
  postgres-data:
  minio-data:
