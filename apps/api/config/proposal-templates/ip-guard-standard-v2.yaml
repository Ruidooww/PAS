id: ip-guard-standard-v2
name: IP-Guard 标准方案 v2
version: 2
product: IP-Guard
sections:
  - id: project-background
    title: 项目背景
    retrievalIntent: 无需检索，基于 customer、industry 和 scale 填充客户项目背景
    promptTemplate: |
      面向客户说明 {{customer}} 所处的 {{industry}} 行业背景、组织规模 {{scale}}、信息安全建设目标与本项目价值。
      仅使用已提供的客户信息，不补造经营数据、监管结论或未确认痛点。
    variables:
      - customer
      - industry
      - scale
    fixed: true

  - id: requirement-analysis
    title: 需求分析
    retrievalIntent: 无需检索，基于 requirementJson 归纳客户需求
    promptTemplate: |
      将 {{requirementJson}} 整理为客户现状、核心诉求、优先级、边界条件和待确认问题。
      保留需求原意，避免扩展未确认的需求；缺少事实依据时写 [待补充]。
    variables:
      - requirementJson
    fixed: true

  - id: compliance-boundary
    title: 合规与数据边界
    retrievalIntent: IP-Guard 合规审计、数据防泄漏、终端管控边界
    promptTemplate: |
      结合检索资料说明本方案覆盖的数据安全、终端管控、文档加密、审计留痕和外发管控边界。
      不承诺未在资料中出现的法规认证、等保结论或客户已通过验收状态。
    variables:
      - requirementJson

  - id: solution-overview
    title: 方案概述
    retrievalIntent: IP-Guard 产品架构、核心能力和典型部署模式
    promptTemplate: |
      基于检索到的 IP-Guard 产品架构资料，说明方案总体思路、组件关系、能力边界和与客户诉求的对应关系。
      引用具体产品能力时标注知识来源；缺少依据时写 [待补充]。
    variables:
      - requirementJson

  - id: module-catalog
    title: 模块清单
    retrievalIntent: IP-Guard 模块目录、终端安全、文档加密、外发管控、审计、资产管理
    promptTemplate: |
      按客户需求输出 IP-Guard 模块清单，至少包含模块名称、适用诉求、关键能力、配置建议和依赖前提。
      模块不得脱离 {{requirementJson.needs[]}} 任意扩展；未确认模块放入 [待确认]。
    variables:
      - requirementJson.needs[]

  - id: deployment-architecture
    title: 部署架构
    retrievalIntent: IP-Guard 部署架构 {{scale}} 终端规模适配
    promptTemplate: |
      基于检索资料和客户规模 {{scale}}，给出组件部署、网络位置、容量与高可用建议。
      不得编造未在资料中出现的产品规格；缺少依据时写 [待补充]。
    variables:
      - scale

  - id: implementation-plan
    title: 实施计划
    retrievalIntent: 无需检索，基于 requirementJson 微调标准实施阶段和交付边界
    promptTemplate: |
      按调研确认、方案设计、环境准备、部署配置、试运行、验收交付的阶段输出实施计划。
      根据 {{requirementJson}} 微调重点、前置条件、客户配合事项、交付物和风险缓解动作。
    variables:
      - requirementJson
    fixed: true

  - id: acceptance-criteria
    title: 验收标准
    retrievalIntent: IP-Guard 验收项、终端管控验收、文档加密验收、审计验收
    promptTemplate: |
      输出可执行的验收标准，覆盖功能启用、策略命中、告警审计、报表导出、权限边界和异常回退。
      每条验收标准应包含验证方式、通过标准和责任方；不写无法验证的泛化承诺。
    variables:
      - requirementJson

  - id: service-support
    title: 服务与支持
    retrievalIntent: 无需检索，使用标准服务与支持章节
    promptTemplate: |
      说明标准的实施支持、问题响应、知识转移、运维建议和后续扩展建议。
      不承诺未明确的服务等级、期限或商务条款。
    variables: []
    fixed: true
