name: RAGFlow Gate

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run baseline gate
        run: pnpm gate:run --params baseline
        env:
          RAGFLOW_BASE_URL: ${{ secrets.RAGFLOW_BASE_URL }}
          RAGFLOW_API_KEY: ${{ secrets.RAGFLOW_API_KEY }}
          PAS_GATE_KB_ID: ${{ secrets.PAS_GATE_KB_ID }}

      - name: Upload gate results
        uses: actions/upload-artifact@v4
        with:
          name: ragflow-gate-results
          path: apps/gate/results/**
          if-no-files-found: error
