name: Images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

env:
  ACR_REGISTRY: registry.cn-hangzhou.aliyuncs.com
  ACR_IMAGE: registry.cn-hangzhou.aliyuncs.com/ruidoww/pas

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: api
            dockerfile: apps/api/Dockerfile
            target: runner
          - component: web
            dockerfile: apps/web/Dockerfile
            target: runner

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ACR_IMAGE }}
          tags: |
            type=sha,prefix=${{ matrix.component }}-,format=short
            type=raw,value=${{ matrix.component }}-latest,enable={{is_default_branch}}
            type=ref,event=tag,prefix=${{ matrix.component }}-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=acr-${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=acr-${{ matrix.component }}
